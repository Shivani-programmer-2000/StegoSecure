<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Steganography App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #2980b9, #6dd5fa, #ffffff);
            background-size: 200% 200%;
            animation: gradientShift 10s ease infinite;
            padding: 40px 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 50px;
            font-size: 2.5rem;
            text-shadow: 1px 2px 5px rgba(0, 0, 0, 0.3);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        .form-box {
            background: #fff;
            padding: 30px 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            width: 320px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .form-box h2 {
            margin-top: 0;
            font-weight: 600;
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input[type="file"],
        input[type="text"] {
            margin-bottom: 15px;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        button {
            background: #3498db;
            color: white;
            padding: 12px;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: #2980b9;
            transform: scale(1.03);
        }

        @media (max-width: 768px) {
            .form-box {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<h1>🔐 Steganography Web App</h1>

<div class="container">

    <!-- LSB Hide Form -->
    <div class="form-box">
        <h2>Hide Text (LSB)</h2>
        <form action="/lsb/hide" method="POST" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <input type="text" name="secret" placeholder="Enter secret message" required>
            <input type="text" name="key" placeholder="Enter encryption key" required>
            <button type="submit">🔐 Hide Message</button>
        </form>
    </div>

    <!-- LSB Reveal Form -->
    <div class="form-box">
        <h2>Reveal Text (LSB)</h2>
        <form action="/lsb/reveal" method="POST" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <input type="text" name="key" placeholder="Enter decryption key" required>
            <button type="submit">🔍 Reveal Message</button>
        </form>
    </div>

    <!-- DL Hide Form -->
    <div class="form-box">
        <h2>Hide Image (Deep Learning)</h2>
        <form action="/dl/hide" method="POST" enctype="multipart/form-data">
            <input type="file" name="cover_image" required>
            <input type="file" name="secret_image" required>
            <button type="submit">🧠 Hide Image</button>
        </form>
    </div>

</div>

</body>
</html>
